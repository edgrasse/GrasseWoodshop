<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Delete Test</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:monospace;padding:16px;background:#f5f5f5;}
pre{background:white;padding:12px;border-radius:8px;overflow-x:auto;font-size:11px;white-space:pre-wrap;word-break:break-all;}
.ok{background:#d4edda;color:#155724;padding:8px 12px;border-radius:6px;margin:8px 0;font-weight:bold;}
.err{background:#f8d7da;color:#721c24;padding:8px 12px;border-radius:6px;margin:8px 0;font-weight:bold;}
button{padding:10px 20px;font-size:15px;background:#C4773B;color:white;border:none;border-radius:8px;cursor:pointer;margin:4px;}
img{width:80px;height:80px;object-fit:cover;border-radius:6px;margin:4px;border:2px solid #ccc;}
</style>
</head>
<body>
<h2>🗑️ Delete Test</h2>
<div id="output"></div>
<script>
const WORKER_URL = 'https://egcw-proxy.ed-53c.workers.dev';
const SUPABASE_URL = 'https://boousgzchnrrhrlyhday.supabase.co';

async function loadFiles() {
  const out = document.getElementById('output');
  out.innerHTML = '<p>Loading imports...</p>';
  const res = await fetch(WORKER_URL+'/supabase', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'storage-list', bucket:'workshop-photos', prefix:'imports/'})
  });
  const data = await res.json();
  const files = Array.isArray(data) ? data.filter(f=>f.name&&f.name!=='.emptyFolderPlaceholder') : [];
  
  if(!files.length){ out.innerHTML='<div class="err">No files found</div>'; return; }
  
  // Show first file with delete test button
  const f = files[0];
  const fileName = 'imports/' + f.name;
  const url = SUPABASE_URL+'/storage/v1/object/public/workshop-photos/'+fileName;
  
  out.innerHTML = `
    <div class="ok">Found ${files.length} files. Testing delete on first file:</div>
    <p><b>File name from API:</b> ${f.name}</p>
    <p><b>Full path to send:</b> ${fileName}</p>
    <img src="${url}">
    <br><br>
    <button onclick="testDelete('${fileName}')">🗑️ Test Delete this file</button>
    <div id="delete-result"></div>
  `;
}

async function testDelete(fileName) {
  const dr = document.getElementById('delete-result');
  dr.innerHTML = '<p>Deleting...</p>';
  
  const payload = {action:'storage-delete', bucket:'workshop-photos', fileName: fileName};
  dr.innerHTML += '<p><b>Sending payload:</b></p><pre>'+JSON.stringify(payload, null, 2)+'</pre>';
  
  const res = await fetch(WORKER_URL+'/supabase', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  
  if(res.ok && data.status==='ok') {
    dr.innerHTML += '<div class="ok">✅ DELETE SUCCEEDED - HTTP '+res.status+'</div>';
    dr.innerHTML += '<pre>'+JSON.stringify(data, null, 2)+'</pre>';
  } else {
    dr.innerHTML += '<div class="err">❌ DELETE FAILED - HTTP '+res.status+'</div>';
    dr.innerHTML += '<pre>'+JSON.stringify(data, null, 2)+'</pre>';
  }
  
  // Reload list to confirm
  setTimeout(async ()=>{
    const res2 = await fetch(WORKER_URL+'/supabase', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'storage-list', bucket:'workshop-photos', prefix:'imports/'})
    });
    const data2 = await res2.json();
    const count = Array.isArray(data2) ? data2.filter(f=>f.name&&f.name!=='.emptyFolderPlaceholder').length : '?';
    dr.innerHTML += '<div class="ok">Files remaining after delete: '+count+'</div>';
  }, 1000);
}

loadFiles();
</script>
</body>
</html>
